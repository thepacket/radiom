# fly.toml app configuration file generated for radiom on 2026-04-28T08:09:31-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'radiom'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

# ─── Optional: expose AGW Packet Engine externally ────────────────────
# direwolf serves the AGWPE binary protocol on TCP 8000 whenever any
# of the packet decoders is active. By default the port is only
# reachable inside the fly machine. To let an external APRSIS32 /
# UI-View / AGWMonitor connect to it, uncomment the block below and
# `fly deploy`. Fly will allocate a public port on the edge and tunnel
# raw TCP through to 8000 in the container.
#
# [[services]]
#   internal_port = 8000
#   protocol = "tcp"
#   processes = ["app"]
#   [[services.ports]]
#     port = 8000
#   [[services.tcp_checks]]
#     interval = "15s"
#     timeout = "2s"
