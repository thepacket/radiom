# direwolf config for VHF AX.25 packet (1200 baud AFSK, Bell-202).
# The dominant amateur packet rate on 144 MHz APRS — orders of
# magnitude more traffic than 300-baud HF.
#
# - ADEVICE stdin: read raw signed 16-bit mono PCM from stdin.
# - ARATE 12000:   sample rate matching the rest of the radiom audio
#                  chain (Nyquist for 2200 Hz mark tone is 4.4 kHz; 12k
#                  is well above).
# - MODEM 1200:    Bell-202 AFSK at 1200/2200 Hz (the implicit defaults
#                  when MODEM is set to 1200 bps).
# - ACHANNELS 1 / CHANNEL 0: single-channel mono input.
ADEVICE - null
ARATE 12000
ACHANNELS 1
CHANNEL 0
MODEM 1200
MYCALL N0CALL

# AGW Packet Engine server — see direwolf.conf for details.
AGWPORT 8000
