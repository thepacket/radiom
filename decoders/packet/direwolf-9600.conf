# direwolf config for 9600 baud G3RUH packet.
#
# G3RUH is direct FSK on the audio carrier (NOT AFSK), ±4 kHz peak
# deviation, scrambled NRZ. Used on:
#   - FOX-1A/B/C/D/E + AMSAT cubesats (435 MHz downlinks)
#   - ISS 9600 packet windows (rare)
#   - Some 70 cm terrestrial UHF packet networks
#
# Baseband bandwidth is ~9.6 kHz — needs ≥24 kHz audio sample rate.
# We bump ARATE to 48 kHz; the bridge upsamples 12 kHz → 48 kHz
# (linear interp) before piping in. Note that the SOURCE must
# actually deliver wideband audio (>6 kHz bandwidth) for this to
# produce decodes — Kiwi audio is band-limited at the server side
# at ~6 kHz max and will yield nothing here regardless of resample.
#
# - ADEVICE stdin: read raw signed 16-bit mono PCM from stdin.
# - ARATE 48000:   wide enough Nyquist for 9600 G3RUH baseband.
# - MODEM 9600:    direct FSK, scrambled NRZ (the G3RUH standard).
# Audio I/O: read from stdin, discard transmit (we never TX from a
# fly VM). The second arg to ADEVICE is an ALSA device name, not a
# file path; `null` is the built-in libasound null PCM that accepts
# writes without error, present on every Linux even when no real
# audio hardware is configured.
ADEVICE - null
ARATE 48000
ACHANNELS 1
CHANNEL 0
MODEM 9600
MYCALL N0CALL

# AGW Packet Engine server — see direwolf.conf for details.
AGWPORT 8000
