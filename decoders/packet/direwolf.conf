# Minimal direwolf config for HF AX.25 packet decoding (300-baud F1A).
#
# - ADEVICE stdin: read raw signed 16-bit mono PCM from stdin.
# - ARATE 12000:   sample rate matching the rest of the radiom audio chain.
# - MODEM 300:     HF packet uses 300 bps AFSK with 1600/1800 Hz tones
#                  (the implicit defaults at 300 bps).
# - RX 0 STDOUT:   we don't actually need this directive; direwolf prints
#                  every decoded frame to stdout by default.
ADEVICE - null
ARATE 12000
ACHANNELS 1
CHANNEL 0
MODEM 300
MYCALL N0CALL

# AGW Packet Engine server — exposes decoded AX.25 frames over TCP
# port 8000 for client apps like APRSIS32, UI-View, AGWMonitor.
# RX-only in radiom (we don't TX from a fly VM). External reachability
# requires opening port 8000 in fly.toml — see the commented
# [[services]] block at the bottom of that file.
AGWPORT 8000
