# direwolf config for IL2P (Improved Layer-2 Protocol) framing.
#
# IL2P is Nino Carrillo's (KK4HEJ) FEC-enhanced AX.25 alternative.
# direwolf 1.6+ enables IL2P receive AUTOMATICALLY on any channel
# that has IL2P support compiled in — there is no config directive
# for it (no IL2PRX line). The "ILP" button differs from the plain
# VHF button only in that the bridge spawns direwolf with `-d 2`
# which prints IL2P-specific debug lines so the user can see which
# frames decoded via IL2P FEC vs plain AX.25.
#
# - MODEM 1200  : same Bell-202 modulation as VHF APRS.
ADEVICE - /tmp/direwolf-tx.wav
ARATE 12000
ACHANNELS 1
CHANNEL 0
MODEM 1200
MYCALL N0CALL

# AGW Packet Engine server — see direwolf.conf for details.
AGWPORT 8000
